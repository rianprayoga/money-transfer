services:
  database:
    image: "postgres:14"
    ports:
      - 5432:5432
    volumes:
      - ${PWD}/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: money_trx
  redis:
    image: redis:6.0.19
    ports:
      - 6379:6379
